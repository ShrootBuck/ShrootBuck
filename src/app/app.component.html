<mat-toolbar>
  <!-- Desktop Menu -->
  <div id="desktopMenu">
    <a mat-button *ngFor="let menuItem of menu" [href]="menuItem.link"
      ><mat-icon *ngIf="menuItem.icon">{{ menuItem.icon }}</mat-icon
      >{{ menuItem.name }}</a
    >
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu">
    <button mat-icon-button [matMenuTriggerFor]="mobileMenu">
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #mobileMenu="matMenu">
      <a mat-menu-item *ngFor="let menuItem of menu" [href]="menuItem.link">
        <mat-icon *ngIf="menuItem.icon">{{ menuItem.icon }}</mat-icon
        >{{ menuItem.name }}
      </a>
    </mat-menu>
  </div>

  <span style="flex: 1 1 auto"></span>
  <a mat-icon-button href="https://twitter.com/shrootbuck" target="_blank">
    <mat-icon svgIcon="x"></mat-icon>
  </a>
  <a mat-icon-button href="https://github.com/shrootbuck" target="_blank">
    <mat-icon svgIcon="github"></mat-icon>
  </a>
</mat-toolbar>

<router-outlet></router-outlet>
